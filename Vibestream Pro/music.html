            background: linear-gradient(to right, red, black);
            color: white;

        }

        header {
            padding: 30px;
            font-size: 32px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
        }

        .playlist-container {
            display: flex;

        .song-card {

            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .song-card:hover {
            transform: scale(1.05);
        }

        footer {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            margin-top: 20px;
        }
    </style>
</head>
