<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soda Musica</title>
    
    <style>
        /* BLACK BACKGROUND */
        body {
            background-color: black; /* Black background for page */ 
            color: white;
            font-family: Arial, sans-serif;	
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background: #000;
            padding: 20px;
        }
        
        img {
            margin-right: -1200px;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            color: #ff0000; /* Red title */
        }

        .playlist-container {
            margin-center: 5px auto;
            width: 90%;
            max-width: 100px;
        }

        iframe {
            border-radius: 12px;
            width: 100%;
            height: 250px;
            border: 0;
        }

        .track-list {
            margin-top: 30px;
            text-align: left;
        }
        .track-list li {
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 1rem;
            color: #ff0000; /* Red text */
        }
        .track-list li span {
            color: white; /* White for some text contrast */
        }

        /* ICON STYLES */
        .icon {
            color: #ff0000; /* Red icons */
            font-size: 24px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    
    <a href="log.html"><img src="login-ic.png" height="30" margin-right: -1200px></a>
    <header>
        <h1>🎶Soda Music</h1>
    </header>
    <div class="playlist-container">
        <!-- Spotify Playlist Embed -->
     <img src="Coke Soda.GIF">
    </div>

    <div class="track-list">
        <h2 style="color:white;">Playlist Tracks</h2>
        <ul>
            <li><span class="icon">🎧</span>Relap Tuwing 10pm</li>
            <li><span class="icon">❤️</span>Favorites</li>
            <li><span class="icon">🔥</span>Thirst Traps</li>
            <li><span class="icon">🎵</span><a href="music.html">All Songs</a></li>
        </ul>
    </div>

</body>
</html>
