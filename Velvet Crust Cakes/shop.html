<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velvet Crust Cakes | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Velvet Crust</div>
        <div class="nav-links">
            <a href="index.html" class="btn-cream">Home</a>
            <a href="shop.html" class="btn-cream">Order</a>
            <a href="summary.html" class="btn-cream">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html" class="btn-cream" style="background:transparent; border:1px solid var(--cream); color:white;">Login</a>
        </div>
    </nav>



    
    <div id="cart-modal" class="modal-overlay">
        <div class="container" style="max-width: 400px; text-align: center;">
            <h2 id="modal-title">Confirm Selection</h2>
            <p id="modal-msg"></p>
            <div id="qty-box" style="display:none; margin: 20px;">
                <label>Quantity: </label>
                <input type="number" id="item-qty" value="1" min="1" style="width: 60px; padding: 5px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="modal-yes" class="btn-cream" style="flex:1">Yes</button>
                <button id="modal-no" class="btn-cream" style="flex:1; background:rgba(255,255,255,0.2); color:white;">No</button>
            </div>
        </div>
    </div>
        
    <section id="shop" class="page">
            
    <div class="category-filters" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">

            <div class="category-filters" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">
                <button class="btn-cream category-btn active" data-category="all" style="padding: 10px 20px; font-size: 0.9rem;">All Cakes</button>
                <button class="btn-cream category-btn" data-category="Chocolate" style="padding: 10px 20px; font-size: 0.9rem;">Chocolate</button>
                <button class="btn-cream category-btn" data-category="Fruit" style="padding: 10px 20px; font-size: 0.9rem;">Fruit</button>
                <button class="btn-cream category-btn" data-category="Classic" style="padding: 10px 20px; font-size: 0.9rem;">Cheesecake</button>
                <button class="btn-cream category-btn" data-category="Specialty" style="padding: 10px 20px; font-size: 0.9rem;">Oreo</button>
            </div>

    </div>

        </section>
    <div class="container">

        <section id="shop" class="page">
            <h2 style="margin-bottom: 30px;">Available Cakes</h2>
            <div class="grid" id="full-grid"></div>
        </section>


    
    </div>
    <script src="script.js"></script>
</body>
</html>
